name: Deploy site to GitHub Pages

# Builds the static Next.js search site and publishes it to GitHub Pages.
# Enable once under Settings -> Pages -> Source: GitHub Actions.
# The site is served under a repo subpath, so AOG_BASE_PATH is set to the repo name.

on:
  push:
    branches: [main]
    paths:
      - "site/**"
      - "dist/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: site
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: site/package-lock.json
      - run: npm ci
      - name: Build static export
        env:
          AOG_BASE_PATH: /${{ github.event.repository.name }}
        run: npm run build
      - name: Disable Jekyll processing
        run: touch out/.nojekyll
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site/out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
